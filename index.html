<html>

<head>
  <title>Solitaire</title>
  <link href="./index.scss" rel="stylesheet">
  <link rel="shortcut icon" href="./Images/Icon.png">
  <link rel="apple-touch-icon" href="./Images/Icon-Solid.png">
  <script type="module" src="./index.ts"></script>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
  <div id="site-header">
    <a href="#" id="home-link">Solitaire Hub</a>
    <div>
      <span id="active-game-title"></span>
      <a href="#" id="back-link" style="display: none;">Back to Games</a>
    </div>
  </div>

  <div id="homepage" style="display: none;">
    <h1>Select a Game</h1>
    <p>Welcome to Solitaire Hub. Choose a game to start playing.</p>
    <div id="game-grid"></div>
  </div>

  <div id="game-container" style="display: none;">
    <div id="tableHolder">
    </div>
    <div id="buttons">
      <button id="newGameButton">New Game</button>
      <button id="undoButton">Undo</button>
      <button id="redoButton">Redo</button>
    </div>
  </div>

  <div id="site-footer">
    <a href="https://github.com/EricOdonga/SolitaireLib" target="_blank">SolitaireLib</a> &copy; Eric Odonga
  </div>

  <template id="rootViewTemplate">
    <div class="cardTable">
      <span class="gameScore">12 / 100</span>
    </div>
  </template>

  <template id="cardViewTemplate">
    <div class="card">
      <div class="cardRotation">
        <div class="cardFront"></div>
        <div class="cardBack"></div>
      </div>
    </div>
  </template>

  <template id="pileViewTemplate">
    <div class="pile">
    </div>
  </template>
</body>

</html>
